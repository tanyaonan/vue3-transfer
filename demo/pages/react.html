<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Transfer Render Demo</title>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { React, ReactDOM, ReactJSXRuntime, styled, loadAntd, resolveAntdTags } from '../vendor/react/vendor.js'
    import { renderReactToDOM } from '../../dist/react.js'

    const response = await fetch('../components/counter.jsx')
    if (!response.ok) {
      throw new Error(`Failed to fetch counter.jsx: ${response.status} ${response.statusText}`)
    }
    const source = await response.text()

    const antdTags = resolveAntdTags(source)
    const usesAntd = antdTags.length > 0

    window.React = React
    window.ReactDOM = ReactDOM
    window.ReactJSXRuntime = ReactJSXRuntime
    window.styled = styled
    if (usesAntd) {
      window.antd = await loadAntd(antdTags)
    }

    const rendered = await renderReactToDOM(source, {
      filename: 'counter.jsx',
      globals: {
        'antd': 'antd',
        'styled-components': 'styled',
      },
    })

    rendered.mount('#root')

    window.addEventListener('beforeunload', () => {
      rendered.unmount()
    })
  </script>
</body>
</html>
