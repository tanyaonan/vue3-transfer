<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Transfer Render Demo</title>
  <link rel="stylesheet" href="../vendor/vue/styles/vendor.css">
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { Vue, loadElementPlus, resolveElementPlusTags } from '../vendor/vue/vendor.js'
    import { renderVueToDOM } from '../../dist/vue3-transfer.js'

    const response = await fetch('../components/counter.vue')
    if (!response.ok) {
      throw new Error(`Failed to fetch counter.vue: ${response.status} ${response.statusText}`)
    }
    const source = await response.text()

    const elementPlusTags = resolveElementPlusTags(source)
    const usesElementPlus = elementPlusTags.length > 0

    window.Vue = Vue
    if (usesElementPlus) {
      window.ElementPlus = await loadElementPlus(elementPlusTags)
    }

    const rendered = await renderVueToDOM(source, {
      filename: 'counter.vue',
      vapor: false,
      globals: usesElementPlus
        ? { 'element-plus': 'ElementPlus' }
        : undefined,
      resolver: {
        async resolve(specifier) {
          const url = new URL(specifier, new URL('../components/', location.href))
          const res = await fetch(url)
          return res.ok ? res.text() : null
        },
      },
    })

    rendered.mount('#app')

    window.addEventListener('beforeunload', () => {
      rendered.unmount()
    })
  </script>
</body>
</html>
