<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Transfer Render Demo</title>
  <link rel="stylesheet" href="./vendor/styles/vendor.css">
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { Vue, loadElementPlus, resolveElementPlusTags } from './vendor/vendor.js'
    import { renderVueToDOM } from '../dist/vue3-transfer.js'

    const response = await fetch('./Counter.vue')
    if (!response.ok) {
      throw new Error(`Failed to fetch Counter.vue: ${response.status} ${response.statusText}`)
    }
    const source = await response.text()

    const elementPlusTags = resolveElementPlusTags(source)
    const usesElementPlus = elementPlusTags.length > 0

    window.Vue = Vue
    if (usesElementPlus) {
      window.ElementPlus = await loadElementPlus(elementPlusTags)
    }

    const rendered = await renderVueToDOM(source, {
      filename: 'Counter.vue',
      vapor: false,
      globals: usesElementPlus
        ? { 'element-plus': 'ElementPlus' }
        : undefined,
    })

    rendered.mount('#app')

    window.addEventListener('beforeunload', () => {
      rendered.unmount()
    })
  </script>
</body>
</html>
