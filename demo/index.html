<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Transfer Render Demo</title>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { renderVueToDOM } from '../dist/vue3-transfer.js'

    const response = await fetch('./Counter.vue')
    if (!response.ok) {
      throw new Error(`Failed to fetch Counter.vue: ${response.status} ${response.statusText}`)
    }
    const source = await response.text()

    const rendered = await renderVueToDOM(source, { filename: 'Counter.vue' })

    // Preview: mount to #app
    rendered.mount('#app')

    // Clean up when the page is unloaded
    window.addEventListener('beforeunload', () => {
      rendered.unmount()
    })
  </script>
</body>
</html>
