<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Transfer Render Demo</title>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { renderVueToDOM } from '../dist/vue3-transfer.js'

    const response = await fetch('./Counter.vue')
    if (!response.ok) {
      throw new Error(`Failed to fetch Counter.vue: ${response.status} ${response.statusText}`)
    }
    const source = await response.text()

    // 简单检测 SFC 是否使用了 Element Plus
    const usesElementPlus =
      /<\s*el-[\w-]+/.test(source) ||
      source.includes('from \'element-plus\'') ||
      source.includes('from "element-plus"')

    // 编译组件，组件代码会延迟到 mount() 时才执行
    const rendered = await renderVueToDOM(source, {
      filename: 'Counter.vue',
      globals: usesElementPlus
        ? { 'element-plus': 'ElementPlus' }
        : undefined,
    })

    // 按需加载 Element Plus：只有 SFC 用到时才加载
    if (usesElementPlus) {
      // Element Plus 在线脚本需要全局 Vue 才能正确初始化
      window.Vue = window.__VUE_TRANSFER_RUNTIME__

      const link = document.createElement('link')
      link.rel = 'stylesheet'
      link.href = 'https://unpkg.com/element-plus/dist/index.css'
      document.head.appendChild(link)

      await new Promise((resolve, reject) => {
        const script = document.createElement('script')
        script.src = 'https://unpkg.com/element-plus/dist/index.full.js'
        script.onload = resolve
        script.onerror = () => reject(new Error('Failed to load Element Plus'))
        document.head.appendChild(script)
      })
    }

    // 挂载到 #app 进行预览（不全局注册组件）
    rendered.mount('#app')

    // 页面卸载时清理组件
    window.addEventListener('beforeunload', () => {
      rendered.unmount()
    })
  </script>
</body>
</html>
