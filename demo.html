<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Transfer Render Demo</title>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { renderVueToDOM } from './dist/vue3-transfer.js'

    const source = `
<template>
  <div class="counter">
    <p class="count">Count: {{ count }}</p>
    <div class="actions">
      <button class="btn" @click="increment">+1</button>
      <button class="btn" @click="decrement">-1</button>
      <button class="btn reset" @click="reset">Reset</button>
    </div>
  </div>
</template>

<script setup>
import { ref } from 'vue'

const count = ref(0)

function increment() {
  count.value++
}

function decrement() {
  count.value--
}

function reset() {
  count.value = 0
}
<\/script>

<style scoped>
.counter {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 32px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  max-width: 320px;
  margin: 40px auto;
  font-family: system-ui, -apple-system, sans-serif;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.count {
  font-size: 24px;
  font-weight: 600;
  color: #333;
  margin: 0;
}

.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  min-width: 72px;
  padding: 8px 16px;
  font-size: 14px;
  color: #fff;
  background-color: #42b883;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s;
}

.btn:hover {
  background-color: #369870;
}

.btn.reset {
  background-color: #6c757d;
}

.btn.reset:hover {
  background-color: #5a6268;
}
</style>
`

    const { app, style } = await renderVueToDOM(source, '#app')

    // Clean up styles when the page is unloaded so styles don't leak between
    // renders in a long-lived dynamic preview application.
    window.addEventListener('beforeunload', () => {
      app.unmount()
      style?.remove()
    })
  </script>
</body>
</html>
